<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Timezones</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
<div class="map-bg">
  <img src="assets/img/worldMap.png" alt="World Map">
</div>

<div class="container">
  <div class="header">
    <div class="PrimaryClock">
      LOCAL TIME - <span id="clock"></span>
	  <div class="hover-display" id="hoverDisplay">
  		Hover a Timezone | UTC | Cities |
	</div>
    </div>
  </div>

<!-- Bottom UTC Zones (Text) -->
  <div class="content">
    <div class="tz" data-offset="-12" style="left: 0%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-11" style="left: 1%;">
      <span class="rotate"></span>
    </div>

    <div class="tz" data-offset="-10" style="left: 7%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-9" style="left: 11.3%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="-8" style="left: 15.4%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-7" style="left: 19.6%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="-6" style="left: 23.8%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-5" style="left: 27.9%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="-4" style="left: 32.1%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-3" style="left: 36.25%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="-2" style="left: 40.35%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-1" style="left: 44.48%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="0" style="left: 48.7%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="1" style="left: 52.8%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="2" style="left: 57.1%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="3" style="left: 61.25%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="4" style="left: 65.4%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="5" style="left: 69.63%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="6" style="left: 73.7%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="7" style="left: 77.94%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="8" style="left: 81.8%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="9" style="left: 86.25%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="10" style="left: 90.5%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="11" style="left: 94.6%;">
      <span class="label2"></span>
    </div>

    <div class="tz" data-offset="12" style="left: 98.8%;">
      <span class="label"></span>
    </div>

    <div class="tz" data-offset="-11" style="left: 100%;">
      <span class="rotate"></span>
    </div>

<!-- Invisable Hover Zones -->
<div class="hover-zones">
  <div class="hover-zone" data-offset="-11" style="left: -1%;"></div>
  <div class="hover-zone" data-offset="-10" style="left: 3%;"></div>
  <div class="hover-zone" data-offset="-9" style="left: 7%;"></div>
  <div class="hover-zone" data-offset="-8" style="left: 11.3%;"></div>
  <div class="hover-zone" data-offset="-7" style="left: 15.4%;"></div>
  <div class="hover-zone" data-offset="-6" style="left: 19.6%;"></div>
  <div class="hover-zone" data-offset="-5" style="left: 23.8%;"></div>
  <div class="hover-zone" data-offset="-4" style="left: 27.9%;"></div>
  <div class="hover-zone" data-offset="-3" style="left: 32.1%;"></div>
  <div class="hover-zone" data-offset="-2" style="left: 36.25%;"></div>
  <div class="hover-zone" data-offset="-1" style="left: 40.35%;"></div>
  <div class="hover-zone" data-offset="0" style="left: 44.48%;"></div>
  <div class="hover-zone" data-offset="1" style="left: 48.7%;"></div>
  <div class="hover-zone" data-offset="2" style="left: 52.8%;"></div>
  <div class="hover-zone" data-offset="3" style="left: 57.1%;"></div>
  <div class="hover-zone" data-offset="4" style="left: 61.25%;"></div>
  <div class="hover-zone" data-offset="5" style="left: 65.4%;"></div>
  <div class="hover-zone" data-offset="6" style="left: 69.63%;"></div>
  <div class="hover-zone" data-offset="7" style="left: 73.7%;"></div>
  <div class="hover-zone" data-offset="8" style="left: 77.94%;"></div>
  <div class="hover-zone" data-offset="9" style="left: 82%;"></div>
  <div class="hover-zone" data-offset="10" style="left: 86.25%;"></div>
  <div class="hover-zone" data-offset="11" style="left: 90.3%;"></div>
  <div class="hover-zone" data-offset="12" style="left: 94.2%;"></div>
  <div class="hover-zone" data-offset="-11" style="left: 98.4%;"></div>
</div>

<!-- Gridlines -->
<div class="grid-lines">
    <div style="left: 0%"></div>
    <div style="left: 3%"></div>
    <div style="left: 7%"></div>
    <div style="left: 11.2%"></div>
    <div style="left: 15.4%"></div>
    <div style="left: 19.6%"></div>
    <div style="left: 23.7%"></div>
    <div style="left: 27.9%"></div>
    <div style="left: 32.1%"></div>
    <div style="left: 36.2%"></div>
    <div style="left: 40.3%"></div>
    <div style="left: 44.5%"></div>
    <div style="left: 48.7%"></div>
    <div style="left: 52.8%"></div>
    <div style="left: 57%"></div>
    <div style="left: 61.15%"></div>
    <div style="left: 65.45%"></div>
    <div style="left: 69.5%"></div>
    <div style="left: 73.6%"></div>
    <div style="left: 77.7%"></div>
    <div style="left: 81.9%"></div>
    <div style="left: 86.20%"></div>
    <div style="left: 90.23%"></div>
    <div style="left: 94.35%"></div>
    <div style="left: 98.26%"></div>
    </div>
  </div>
</div>

<script src="assets/js/main.js" defer></script>

</body>
</html>
